<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipal</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png" />
  <meta name="theme-color" content="#007aff" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="app-header">
      <h1>Flipal</h1>
      <nav class="tabs" aria-label="画面切替">
        <button class="tab active" data-view="home" type="button">今日</button>
        <button class="tab" data-view="archive" type="button">アーカイブ</button>
      </nav>
    </header>

    <main class="view-container">
      <section id="view-home" class="view active" aria-label="ホーム">
        <p id="todayLabel" class="date-label"></p>
        <div id="homeCard" class="card">
          <div class="page-flipper">
            <div id="page-turner" class="page-turner">
              <div class="page-turn-front">
                <img id="homeImage" class="page-image" alt="今日の画像" />
                <div id="tearLine" class="tear-line" aria-hidden="true"></div>
              </div>
              <div class="page-turn-back"></div>
            </div>
          <div class="page-static-next">
              <img id="nextImage" class="page-image" alt="次の日の画像" />
            </div>
          </div>
        </div>

        <div class="controls">
          <p id="flipStatus" class="status"></p>
        </div>
        <div id="testControls" class="test-controls" hidden>
          <p id="testDateLabel" class="test-date-label"></p>
          <div class="test-buttons">
            <button id="testPrevDay" type="button">-1日</button>
            <button id="testToday" type="button">実日付へ戻す</button>
            <button id="testNextDay" type="button">+1日</button>
          </div>
        </div>
      </section>

      <section id="view-archive" class="view" aria-label="アーカイブ">
        <div class="archive-header">
          <h2 class="archive-title">日付一覧</h2>
          <div class="view-toggle">
            <button id="gridViewBtn" class="toggle-btn active" type="button">グリッド</button>
            <button id="calendarViewBtn" class="toggle-btn" type="button">カレンダー</button>
          </div>
        </div>
        <div id="archiveGrid" class="archive-grid active"></div>
        <div id="archiveCalendar" class="archive-calendar"></div>
      </section>

      <section id="view-detail" class="view" aria-label="詳細">
        <div class="detail-head">
          <button id="backToArchive" type="button">一覧に戻る</button>
          <p id="detailDate" class="date-label"></p>
        </div>
        <div class="card detail-card">
          <img id="detailImage" class="page-image" alt="詳細画像" />
          <p id="detailMessage" class="message"></p>
        </div>
        <div class="detail-nav">
          <button id="prevDetail" type="button">前日</button>
          <button id="nextDetail" type="button">翌日</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
