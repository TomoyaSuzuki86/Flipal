<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flipal</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="app" class="app">
    <header class="app-header">
      <h1>Flipal</h1>
      <nav class="tabs" aria-label="画面切替">
        <button class="tab active" data-view="home" type="button">今日</button>
        <button class="tab" data-view="archive" type="button">アーカイブ</button>
      </nav>
    </header>

    <main class="view-container">
      <section id="view-home" class="view active" aria-label="ホーム">
        <p id="todayLabel" class="date-label"></p>
        <div id="homeCard" class="card">
          <div id="pageContainer" class="page-container">
            <img id="homeImage" class="page-image" alt="今日の画像" />
            <div id="curlOverlay" class="curl-overlay" aria-hidden="true"></div>
          </div>
          <p id="homeMessage" class="message"></p>
        </div>

        <div class="controls">
          <button id="flipButton" class="primary" type="button" disabled>次へめくる</button>
          <p id="flipStatus" class="status"></p>
        </div>
      </section>

      <section id="view-archive" class="view" aria-label="アーカイブ">
        <h2 class="archive-title">日付一覧</h2>
        <div id="archiveGrid" class="archive-grid"></div>
      </section>

      <section id="view-detail" class="view" aria-label="詳細">
        <div class="detail-head">
          <button id="backToArchive" type="button">一覧に戻る</button>
          <p id="detailDate" class="date-label"></p>
        </div>
        <div class="card detail-card">
          <img id="detailImage" class="page-image" alt="詳細画像" />
          <p id="detailMessage" class="message"></p>
        </div>
        <div class="detail-nav">
          <button id="prevDetail" type="button">前日</button>
          <button id="nextDetail" type="button">翌日</button>
        </div>
      </section>
    </main>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
